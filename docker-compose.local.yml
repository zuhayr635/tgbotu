version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tgbot
      POSTGRES_PASSWORD: tgbot123
      POSTGRES_DB: tgbotdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgbot"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://tgbot:tgbot123@db:5432/tgbotdb
      SECRET_KEY: local_secret_key_for_dev_only_32ch
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"

volumes:
  postgres_local:
