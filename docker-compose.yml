version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tgbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tgbot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-tgbotdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tgbot}:${POSTGRES_PASSWORD:-tgbot_secret}@db:5432/${POSTGRES_DB:-tgbotdb}
      SECRET_KEY: ${SECRET_KEY:-changeme_super_secret_key_32chars}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tgbot-api.rule=Host(`${DOMAIN:-tele.luanawork.com}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.tgbot-api.entrypoints=websecure"
      - "traefik.http.routers.tgbot-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.tgbot-api.loadbalancer.server.port=8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tgbot-front.rule=Host(`${DOMAIN:-tele.luanawork.com}`)"
      - "traefik.http.routers.tgbot-front.entrypoints=websecure"
      - "traefik.http.routers.tgbot-front.tls.certresolver=letsencrypt"
      - "traefik.http.services.tgbot-front.loadbalancer.server.port=80"

volumes:
  postgres_data:
  uploads_data:
